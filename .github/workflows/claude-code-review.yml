# ============================================================================
# Claude Code — Automated PR Review
# ============================================================================
# Thin wrapper around lentago/shared-workflows/claude-review.yml.
# Pinned to Haiku.
# ============================================================================

name: Claude Code Review

# >>> DISABLED 2026-06-25: automated Claude PR review turned off fleet-wide.
# Trigger changed from `pull_request` to manual `workflow_dispatch` only, so it
# never auto-runs on PRs. The repo-specific review_prompt below is preserved.
# To re-enable, restore the `on: pull_request` trigger (see git history).
on:
  workflow_dispatch:

jobs:
  claude-review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: lentago/shared-workflows/.github/workflows/claude-review.yml@main
    secrets: inherit
    with:
      review_prompt: |
        This repository is a Terraform-managed AWS environment (VPC, ECS
        Fargate behind an ALB with ACM / Route 53, auto-scaling) hosting a
        live site, organized as `modules/` and `environments/` with helper
        bash scripts. Focus your review on:

        1. **Terraform correctness** — dependency-graph issues, resources that
           need multiple applies, missing `variable` validation, count/for_each
           pitfalls, and provider/version drift.
        2. **AWS security posture** — IAM least-privilege (especially the OIDC
           trust that ice-cream-book's deploy assumes), security-group
           exposure, public vs. private subnet placement, encryption at
           rest/in transit.
        3. **Idempotency & state** — will `apply` converge cleanly? Flag
           changes that force-replace stateful resources or risk drift.
        4. **Cost controls** — NAT / Fargate / ALB sizing and anything that
           could silently run up spend.
        5. **Secrets & bash** — no hardcoded credentials or secrets in output;
           helper scripts quoted and idempotent.
