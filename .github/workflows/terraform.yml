# .github/workflows/terraform.yml
#
# Terraform Infrastructure Pipeline
#
# Triggers:
#   1. Pull request → the `changes` job detects .tf/.tfvars edits; if present,
#      Terraform Plan runs. A docs-only PR skips the plan (which counts as a
#      passing required check) so the `gate` job below can be required without
#      deadlocking. See lentago/.github#27.
#   2. Push to main that changes .tf/.tfvars files or this workflow → apply
#
# Authenticates via OIDC using the terraform-specific IAM role.
# Plan output is posted as a PR comment for review.

name: Terraform

on:
  # PR trigger is intentionally NOT path-filtered so the required `gate` check
  # always reports; the .tf/.tfvars filter lives in the `changes` job instead.
  pull_request:
  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.github/workflows/terraform.yml'
      # Lambda handler sources: archive_file hashes them into source_code_hash,
      # so a src-only edit IS a real infra change and must trigger the apply.
      - 'modules/*/src/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # Did this PR touch terraform sources? Gates the plan so a docs-only PR skips
  # it (skipped → the required `gate` check still reports green) and doesn't run
  # a pointless full AWS plan. Non-PR events always count as changed.
  changes:
    runs-on: ubuntu-latest
    outputs:
      tf: ${{ steps.filter.outputs.tf }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Detect terraform changes
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "tf=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          changed=$(git diff --name-only "$BASE_SHA" HEAD)
          echo "changed files:"; echo "$changed"
          # modules/*/src/** = Lambda handler sources (hashed into source_code_hash
          # by archive_file), so a src-only edit is a real infra change too.
          if echo "$changed" | grep -qE '\.tf$|\.tfvars$|^\.github/workflows/terraform\.yml$|^modules/[^/]+/src/'; then
            echo "tf=true" >> "$GITHUB_OUTPUT"
          else
            echo "tf=false" >> "$GITHUB_OUTPUT"
          fi

  plan:
    name: Terraform Plan
    needs: changes
    if: needs.changes.outputs.tf == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: terraform
    # Hidden Pitzi Labs preview host is supplied from the repo Actions
    # variable (not committed to source). Required by var.pitzilabs_preview_host.
    env:
      TF_VAR_pitzilabs_preview_host: ${{ vars.PITZILABS_PREVIEW_HOST }}
      TF_VAR_lentago_preview_host: ${{ vars.LENTAGO_PREVIEW_HOST }}
      TF_VAR_pondview_preview_host: ${{ vars.PONDVIEW_PREVIEW_HOST }}
      TF_VAR_grafana_cloud_account_id: ${{ vars.GRAFANA_CLOUD_ACCOUNT_ID }}
      TF_VAR_grafana_cloud_external_id: ${{ secrets.GRAFANA_CLOUD_EXTERNAL_ID }}
      # Anthropic key for the Essex Crossing HOA wiki's "Ask the Wiki" answer
      # Lambda (module.ask_pondview). Repo Actions secret, never committed.
      TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
    defaults:
      run:
        working-directory: environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::365184644049:role/solidago-dev-github-actions-terraform # Account-specific OIDC role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init -no-color

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        shell: bash
        run: |
          set -o pipefail
          terraform plan -no-color -input=false -lock-timeout=120s -out=tfplan 2>&1 | tee plan-output.txt
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            // GitHub caps issue comments at 65536 chars; a full-rebuild plan
            // (100+ resources) blows past that. Read the plan from a file
            // (never inline it into this script — that overflows ARG_MAX when
            // node spawns) and truncate to the tail, which keeps the summary.
            const MAX = 60000;
            let plan;
            try {
              plan = fs.readFileSync('environments/dev/plan-output.txt', 'utf8');
            } catch (e) {
              plan = `(plan output file unavailable: ${e.message})`;
            }
            let notice = '';
            if (plan.length > MAX) {
              plan = plan.slice(-MAX);
              notice = `> ⚠️ Plan output truncated to the last ${MAX} characters (large rebuild plan). Full plan is in the workflow run logs.`;
            }
            const output = `#### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`

            ${notice}

            <details><summary>Show Plan</summary>

            \`\`\`
            ${plan}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Terraform Apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: terraform
    concurrency:
      group: terraform-apply
      cancel-in-progress: false
    # Hidden Pitzi Labs preview host is supplied from the repo Actions
    # variable (not committed to source). Required by var.pitzilabs_preview_host.
    env:
      TF_VAR_pitzilabs_preview_host: ${{ vars.PITZILABS_PREVIEW_HOST }}
      TF_VAR_lentago_preview_host: ${{ vars.LENTAGO_PREVIEW_HOST }}
      TF_VAR_pondview_preview_host: ${{ vars.PONDVIEW_PREVIEW_HOST }}
      TF_VAR_grafana_cloud_account_id: ${{ vars.GRAFANA_CLOUD_ACCOUNT_ID }}
      TF_VAR_grafana_cloud_external_id: ${{ secrets.GRAFANA_CLOUD_EXTERNAL_ID }}
      # Anthropic key for the Essex Crossing HOA wiki's "Ask the Wiki" answer
      # Lambda (module.ask_pondview). Repo Actions secret, never committed.
      TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
    defaults:
      run:
        working-directory: environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::365184644049:role/solidago-dev-github-actions-terraform # Account-specific OIDC role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init -no-color

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color -input=false -lock-timeout=120s

  # Single required status check for the terraform pipeline. Runs on every PR
  # (if: always()) so the ruleset can require exactly `gate`: it reports green
  # when Terraform Plan succeeded OR was skipped (docs-only PR), and red when it
  # failed — so a bad plan blocks the merge, and therefore the apply.
  gate:
    needs: [changes, plan]
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Terraform gate
        run: |
          echo "changes=${{ needs.changes.result }} plan=${{ needs.plan.result }}"
          for r in "${{ needs.changes.result }}" "${{ needs.plan.result }}"; do
            case "$r" in
              failure|cancelled)
                echo "::error::terraform gate blocked (a required job reported $r)"
                exit 1 ;;
            esac
          done
          echo "gate passed (success/skipped only)"
