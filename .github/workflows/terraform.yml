# .github/workflows/terraform.yml
#
# Terraform Infrastructure Pipeline
#
# Triggers:
#   1. Pull request that changes .tf/.tfvars files or this workflow → plan
#   2. Push to main that changes .tf/.tfvars files or this workflow → apply
#
# Authenticates via OIDC using the terraform-specific IAM role.
# Plan output is posted as a PR comment for review.

name: Terraform

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.github/workflows/terraform.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Terraform Plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: terraform
    # Hidden Pitzi Labs preview host is supplied from the repo Actions
    # variable (not committed to source). Required by var.pitzilabs_preview_host.
    env:
      TF_VAR_pitzilabs_preview_host: ${{ vars.PITZILABS_PREVIEW_HOST }}
      TF_VAR_lentago_preview_host: ${{ vars.LENTAGO_PREVIEW_HOST }}
    defaults:
      run:
        working-directory: environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::365184644049:role/foundry-dev-github-actions-terraform # Account-specific OIDC role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init -no-color

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -lock-timeout=120s -out=tfplan
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v9
        with:
          script: |
            const output = `#### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Terraform Apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: terraform
    concurrency:
      group: terraform-apply
      cancel-in-progress: false
    # Hidden Pitzi Labs preview host is supplied from the repo Actions
    # variable (not committed to source). Required by var.pitzilabs_preview_host.
    env:
      TF_VAR_pitzilabs_preview_host: ${{ vars.PITZILABS_PREVIEW_HOST }}
      TF_VAR_lentago_preview_host: ${{ vars.LENTAGO_PREVIEW_HOST }}
    defaults:
      run:
        working-directory: environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::365184644049:role/foundry-dev-github-actions-terraform # Account-specific OIDC role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init -no-color

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color -input=false -lock-timeout=120s
